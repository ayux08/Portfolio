<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>Resume — Ayush G.</title>
  <meta name="title" content="Resume — Ayush G." />
  <meta name="description" content="View and download the resume of Ayush G., Frontend Developer & Visual Designer." />

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/utilities.css" />

  <style>
    /* -------- Resume Page Specific Styles -------- */
    .resume-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .resume-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 6rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .resume-header {
      text-align: center;
      margin-bottom: 2rem;
      width: 100%;
    }

    .resume-header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .resume-header p {
      opacity: 0.6;
      font-size: 0.95rem;
    }

    .resume-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .resume-actions .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .resume-actions .btn i {
      font-size: 0.9rem;
    }

    .btn-download {
      background: var(--primary-color);
      color: #000;
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      border: 2px solid var(--primary-color);
    }

    .btn-download:hover {
      background: transparent;
      color: var(--primary-color);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 205, 66, 0.25);
    }

    .btn-back {
      background: transparent;
      color: var(--text-color);
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      border: 2px solid var(--border-color);
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    .resume-viewer {
      width: 100%;
      flex: 1;
      min-height: 75vh;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      background: var(--card-background);
      box-shadow: var(--shadow-card);
      position: relative;
    }

    .resume-viewer iframe {
      width: 100%;
      height: 100%;
      min-height: 75vh;
      border: none;
      display: block;
    }

    /* Fallback message when PDF can't load */
    .resume-fallback {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .resume-fallback .fallback-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 205, 66, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--primary-color);
    }

    .resume-fallback h3 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .resume-fallback p {
      opacity: 0.6;
      font-size: 0.9rem;
      max-width: 400px;
    }

    @media (max-width: 768px) {
      .resume-container {
        padding: 5.5rem 1rem 2rem;
      }

      .resume-header h1 {
        font-size: 1.5rem;
      }

      .resume-viewer {
        min-height: 60vh;
        border-radius: 12px;
      }

      .resume-viewer iframe {
        min-height: 60vh;
      }
    }
  </style>
</head>

<body class="resume-page">
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <!-- Logo -->
      <h1 id="logo">
        <a href="main.html">
          <span class="logo-icon">A</span>
          Ayush G.
        </a>
      </h1>

      <!-- Navbar links -->
      <ul class="nav-menu" id="nav-menu">
        <li><a class="nav-link" href="main.html#projects">PROJECTS</a></li>
        <li><a class="nav-link" href="main.html#footer">CONTACT</a></li>
        <li>
          <a class="nav-link btn btn-primary active" href="resume.html">
            RESUME <i class="fas fa-arrow-right"></i>
          </a>
        </li>

        <!-- Dark Mode Toggle -->
        <div class="theme-switch">
          <input type="checkbox" id="switch" />
          <label class="toggle-icons" for="switch">
            <!-- Moon SVG -->
            <svg class="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <!-- Sun SVG -->
            <svg class="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </label>
        </div>
      </ul>

      <!-- Hamburger menu -->
      <div class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </nav>

  <!-- Mobile overlay -->
  <div class="nav-overlay" id="nav-overlay"></div>

  <!-- Resume Content -->
  <div class="resume-container">
    <div class="resume-header">
      <h1>My Resume</h1>
      <p>View my qualifications, experience, and skills</p>
    </div>

    <div class="resume-actions">
      <a href="main.html" class="btn btn-back">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>
      <a href="assets/resume.pdf" download="Ayush_G_Resume.pdf" class="btn btn-download" id="download-btn">
        <i class="fas fa-download"></i> Download Resume
      </a>
    </div>

    <div class="resume-viewer" id="resume-viewer">
      <iframe src="assets/resume.pdf" title="Ayush G. Resume"></iframe>

      <!-- Fallback if PDF doesn't load -->
      <div class="resume-fallback" id="resume-fallback">
        <div class="fallback-icon">
          <i class="fas fa-file-pdf"></i>
        </div>
        <h3>Resume PDF Not Found</h3>
        <p>Please add your resume as <strong>assets/resume.pdf</strong> to display it here.</p>
        <a href="assets/resume.pdf" download="Ayush_G_Resume.pdf" class="btn btn-download">
          <i class="fas fa-download"></i> Try Download Anyway
        </a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    // Check if PDF loaded, show fallback if not
    const iframe = document.querySelector('.resume-viewer iframe');
    const fallback = document.getElementById('resume-fallback');

    iframe.addEventListener('error', function () {
      iframe.style.display = 'none';
      fallback.style.display = 'flex';
    });

    // Additional check after load attempt
    setTimeout(() => {
      try {
        // If iframe has no content or failed silently
        if (iframe.contentDocument && iframe.contentDocument.body &&
          iframe.contentDocument.body.innerHTML === '') {
          iframe.style.display = 'none';
          fallback.style.display = 'flex';
        }
      } catch (e) {
        // Cross-origin or load error — PDF likely loaded fine via browser plugin
      }
    }, 3000);
  </script>
</body>

</html>
